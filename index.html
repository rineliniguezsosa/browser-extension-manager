<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Browser extensions manager UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
  <script type="module" crossorigin src="/browser-extension-manager/assets/index-DKBqdV9U.js"></script>
  <link rel="stylesheet" crossorigin href="/browser-extension-manager/assets/index-gd0nE2Mb.css">
</head>

<body class="px-3 py-6 bg-app-gradient min-h-screen">
  
  <header>
      <div class="rounded-lg p-3 bg-banner  flex justify-between items-stretch">
        <div class="max-w-full">
          <img class="max-w-full h-auto" src="/browser-extension-manager/assets/logo-CzwlH0bz.svg" alt="Logo">
        </div>
        <button id="toggleThemeButton" class="w-1/6 max-w-15 rounded-lg bg-buttonicon flex justify-center
        items-center hover:bg-Neutral-300 focus:border-2 focus:border-Red-400"
        >
        <img id="iconTheme" class="w-5 h-5" src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20width='22'%20height='22'%20fill='none'%20viewBox='0%200%2022%2022'%3e%3cg%20clip-path='url(%23a)'%3e%3cpath%20stroke='%23091540'%20stroke-linecap='round'%20stroke-linejoin='round'%20stroke-width='1.98'%20d='M20.125%2011.877A7.333%207.333%200%201%201%2010.124%201.875a9.168%209.168%200%201%200%2010.001%2010.002Z'/%3e%3c/g%3e%3cdefs%3e%3cclipPath%20id='a'%3e%3cpath%20fill='%23fff'%20d='M0%200h22v22H0z'/%3e%3c/clipPath%3e%3c/defs%3e%3c/svg%3e" alt="Moon Icon">
      </button>
    </div>
  </header>

  <main>

    <div class="w-full flex flex-col mt-4 desktop:flex-row desktop:mt-20" id="extension-list-content">
      <div class="w-full p-5 desktop:p-0">
        <h1 class="text-center font-notosans font-bold text-4xl text-title desktop:text-start">Extensions List</h1>
      </div>

      <div class="flex gap-2 w-full p-1 items-center justify-center desktop:justify-end" id="extension-list-buttons">
        <button data-view="all" class="rounded-full px-5 py-2 font-notosans font-medium bg-button-state text-text 
         hover:text-Neutral-0 hover:bg-Red-400 active buttonState">
          All
        </button>

        <button data-view="active" class="rounded-full px-5 py-2 font-notosans font-medium bg-button-state  text-text 
        hover:text-Neutral-0 hover:bg-Red-400 buttonState">
          Active
        </button>

        <button data-view="inactive" class="rounded-full px-5 py-2 font-notosans font-medium bg-button-state  text-text 
        hover:text-Neutral-0 hover:bg-Red-400 buttonState">
          Inactive
        </button>
      </div>
    </div>

    <div class="w-full mt-10 flex flex-col gap-4 items-center desktop:flex-row 
      desktop:flex-wrap desktop:justify-start desktop:gap-x-1 desktop:gap-y-3" id="extension-list">

    </div>
  </main>

  <footer>
    <div class="attribution mt-5 text-text">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="https://www.frontendmentor.io/profile/rineliniguezsosa">Rinel iñiguez sosa</a>.
    </div>
  </footer>
</body>

</html>
