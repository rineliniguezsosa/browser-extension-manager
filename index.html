<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Browser extensions manager UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <style>
    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }
  </style>
</head>

<body class="px-3 py-6 bg-app-gradient min-h-screen">
  <main class="">

    <div class="rounded-lg p-3 bg-banner  flex justify-between items-stretch">
      <div class="max-w-full">
        <img class="max-w-full h-auto" src="./src/assets/images/logo.svg" alt="Logo">
      </div>

      <button id="toggleThemeButton" class="w-1/6 max-w-15 rounded-lg bg-buttonicon flex justify-center items-center">
        <img id="iconTheme" class="w-5 h-5" src="./src/assets/images/icon-moon.svg" alt="Moon Icon">
      </button>
    </div>

    <div class="w-full flex flex-col mt-4 desktop:flex-row desktop:mt-20" id="extension-list-content">
      <div class="w-full p-5 desktop:p-0">
        <h1 class="text-center font-notosans font-bold text-4xl text-title desktop:text-start">Extensions List</h1>
      </div>

      <div class="flex gap-2 w-full p-1 items-center justify-center desktop:justify-end" id="extension-list-buttons">
        <button class="rounded-full px-5 py-2 font-notosans font-medium active bg-button-state text-text  hover:text-Neutral-0 
              hover:bg-Red-400">
          All
        </button>

        <button class="rounded-full px-5 py-2 font-notosans font-medium bg-button-state  text-text hover:text-Neutral-0 
              hover:bg-Red-400">
          Active
        </button>

        <button class="rounded-full px-5 py-2 font-notosans font-medium bg-button-state  text-text hover:text-Neutral-0 
            hover:bg-Red-400">
          Inactive
        </button>
      </div>
    </div>

    <div class="w-full mt-10 flex flex-col gap-4 desktop:flex-row desktop:flex-wrap" id="extension-list">
     
    </div>

    <div class="attribution mt-5 text-text">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Rinel iñiguez sosa</a>.
    </div>
  </main>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
